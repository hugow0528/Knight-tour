<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>騎士長征 Knight's Tour</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Microsoft JhengHei', Arial, sans-serif;
            background-color: #1a0806;
            background-image:
                radial-gradient(ellipse at 50% 0%, #5c1a0a 0%, #1a0806 65%),
                repeating-linear-gradient(
                    45deg,
                    rgba(180, 60, 10, 0.04) 0px,
                    rgba(180, 60, 10, 0.04) 2px,
                    transparent 2px,
                    transparent 18px
                ),
                repeating-linear-gradient(
                    -45deg,
                    rgba(180, 60, 10, 0.04) 0px,
                    rgba(180, 60, 10, 0.04) 2px,
                    transparent 2px,
                    transparent 18px
                );
            padding: 24px 16px;
            color: #e8d5b0;
        }
        h1 {
            margin-bottom: 8px;
            color: #f5c842;
            font-size: 2.2em;
            letter-spacing: 4px;
            text-shadow: 0 2px 10px rgba(200, 80, 20, 0.6), 0 0 30px rgba(245, 200, 66, 0.3);
        }
        .subtitle {
            color: #c8a870;
            font-size: 0.95em;
            margin-bottom: 22px;
            letter-spacing: 2px;
        }
        .game-container {
            display: flex;
            align-items: flex-start;
            gap: 28px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .board-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(8, 62px);
            grid-template-rows: repeat(8, 62px);
            gap: 3px;
            background-color: #2a0e04;
            padding: 8px;
            border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 0 0 3px #8b4513, 0 0 0 5px #c8860044;
            margin-bottom: 18px;
            display: none;
        }
        .cell {
            width: 62px;
            height: 62px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
            font-weight: bold;
            color: #333;
            transition: background-color 0.25s, transform 0.15s, box-shadow 0.15s;
            border-radius: 7px;
            overflow: hidden;
            position: relative;
        }
        .cell.light {
            background-color: #f0d9b5;
        }
        .cell.dark {
            background-color: #b58863;
        }
        .cell.visited.light {
            background-color: #a8c8a0;
            color: #fff;
        }
        .cell.visited.dark {
            background-color: #6aaa62;
            color: #fff;
        }
        .cell.current {
            border: 3px solid #f0c040;
            transform: scale(1.08);
            box-shadow: 0 0 16px rgba(240,192,64,0.7);
            z-index: 2;
        }
        .cell.valid-move {
            background-color: #5bc8f5 !important;
            cursor: pointer;
            box-shadow: inset 0 0 8px rgba(91,200,245,0.6);
        }
        .cell.valid-move::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(91,200,245,0.55);
            border: 2px solid #5bc8f5;
        }
        .cell:hover {
            transform: scale(1.07);
            z-index: 3;
        }
        .cell.current:hover {
            transform: scale(1.08);
        }
        .cell img {
            width: 88%;
            height: 88%;
            object-fit: contain;
            pointer-events: none;
        }
        @keyframes pop {
            0% { transform: scale(0.7); opacity: 0.5; }
            60% { transform: scale(1.18); }
            100% { transform: scale(1); opacity: 1; }
        }
        .cell.pop {
            animation: pop 0.28s ease;
        }

        /* Info Panel */
        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-width: 200px;
        }
        .info-card {
            background: rgba(80, 20, 5, 0.55);
            border: 1px solid rgba(200, 134, 0, 0.35);
            border-radius: 12px;
            padding: 16px 20px;
            text-align: center;
            backdrop-filter: blur(6px);
        }
        .info-card .label {
            font-size: 0.78em;
            color: #c8a870;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
        }
        .info-card .value {
            font-size: 2em;
            font-weight: bold;
            color: #f5c842;
        }
        .timer-card .value {
            color: #e8a040;
        }
        .timer-card .value.urgent {
            color: #ff6b6b;
            animation: pulse 0.6s ease infinite alternate;
        }
        @keyframes pulse {
            from { opacity: 1; }
            to { opacity: 0.5; }
        }
        .timer-bar-outer {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }
        .timer-bar-inner {
            height: 100%;
            background: linear-gradient(90deg, #c8760a, #f5c842);
            border-radius: 4px;
            transition: width 1s linear, background 0.5s;
            width: 100%;
        }
        .timer-bar-inner.urgent {
            background: linear-gradient(90deg, #ff6b6b, #ff9f43);
        }

        /* Buttons */
        .button-container {
            display: flex;
            gap: 12px;
            margin-bottom: 22px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 11px 26px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #c8860a, #a06200);
            color: #fff8e6;
            box-shadow: 0 4px 14px rgba(180, 100, 20, 0.5);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #e8a020, #c8860a);
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(200, 130, 30, 0.6);
        }
        .btn-primary:active { transform: scale(0.97); }
        .btn-secondary {
            background: rgba(100, 30, 5, 0.5);
            color: #e8d5b0;
            border: 1px solid rgba(200, 134, 0, 0.35);
        }
        .btn-secondary:hover {
            background: rgba(140, 50, 10, 0.65);
            transform: translateY(-2px);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(160deg, #3a1005 0%, #1a0806 100%);
            border: 1px solid rgba(200, 134, 0, 0.45);
            padding: 32px 28px;
            border-radius: 18px;
            box-shadow: 0 16px 48px rgba(0,0,0,0.8);
            z-index: 1000;
            font-size: 16px;
            width: 92%;
            max-width: 420px;
            color: #e8d5b0;
        }
        .modal-content {
            text-align: center;
        }
        .modal h2 {
            color: #f5c842;
            margin-bottom: 16px;
            font-size: 1.6em;
        }
        .modal p {
            color: #c8a870;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        .modal ol {
            text-align: left;
            color: #c8a870;
            line-height: 1.8;
            padding-left: 20px;
            margin: 10px 0 16px;
        }
        .modal input {
            margin: 10px 0 6px;
            padding: 10px 14px;
            font-size: 15px;
            border: 1.5px solid rgba(200, 134, 0, 0.5);
            border-radius: 8px;
            width: 80%;
            background: rgba(80, 20, 5, 0.5);
            color: #e8d5b0;
            outline: none;
            transition: border-color 0.2s;
        }
        .modal input:focus {
            border-color: #f5c842;
        }
        .modal .btn {
            margin-top: 18px;
            width: 60%;
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.75);
            backdrop-filter: blur(3px);
            z-index: 999;
        }

        /* End Modal special */
        .end-score {
            font-size: 2.4em;
            font-weight: bold;
            color: #f5c842;
            margin: 12px 0;
        }
        .end-msg {
            color: #c8a870;
            font-size: 1.05em;
        }

        /* 龍虎榜 Leaderboard */
        .leaderboard-section {
            width: 100%;
            max-width: 560px;
            margin-top: 32px;
        }
        .leaderboard-card {
            background: linear-gradient(160deg, #3a1005 0%, #1a0806 100%);
            border: 2px solid #8b4513;
            border-radius: 16px;
            padding: 20px 24px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.6), 0 0 0 1px rgba(200,134,0,0.2);
        }
        .leaderboard-card h2 {
            color: #f5c842;
            font-size: 1.5em;
            letter-spacing: 4px;
            text-align: center;
            margin-bottom: 16px;
            text-shadow: 0 0 12px rgba(200,134,0,0.5);
        }
        .leaderboard-card ol {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .lb-row {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            border-radius: 8px;
            margin-bottom: 6px;
            background: rgba(80, 20, 5, 0.45);
            border: 1px solid rgba(200, 134, 0, 0.15);
        }
        .lb-row:first-child {
            background: rgba(160, 80, 0, 0.35);
            border-color: rgba(245, 200, 66, 0.4);
        }
        .lb-rank {
            font-size: 1.3em;
            width: 36px;
            text-align: center;
            flex-shrink: 0;
        }
        .lb-name {
            flex: 1;
            color: #e8d5b0;
            font-size: 1em;
            padding: 0 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .lb-score {
            color: #f5c842;
            font-weight: bold;
            font-size: 1em;
            white-space: nowrap;
        }
        .lb-date {
            color: #a08060;
            font-size: 0.78em;
            margin-left: 10px;
            white-space: nowrap;
        }
        .lb-empty {
            color: #a08060;
            text-align: center;
            padding: 12px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1>♞ 騎士長征</h1>
    <p class="subtitle">Knight's Tour — 限時挑戰</p>
    <div class="button-container">
        <button class="btn btn-primary" onclick="showGuide()">🎮 開始遊戲</button>
    </div>
    <div class="game-container">
        <div class="board-wrapper">
            <div class="board" id="board"></div>
        </div>
        <div class="info-panel" id="infoPanel" style="display:none;">
            <div class="info-card">
                <div class="label">玩家</div>
                <div class="value" id="playerDisplay" style="font-size:1.2em;color:#e8d5b0;">—</div>
            </div>
            <div class="info-card">
                <div class="label">移動次數</div>
                <div class="value" id="moveCounter">0</div>
            </div>
            <div class="info-card timer-card">
                <div class="label">剩餘時間</div>
                <div class="value" id="timerValue">30</div>
                <div class="timer-bar-outer">
                    <div class="timer-bar-inner" id="timerBar"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 龍虎榜 Leaderboard -->
    <div class="leaderboard-section">
        <div class="leaderboard-card">
            <h2>🐉 龍虎榜 🐯</h2>
            <ol id="leaderboardList">
                <li class="lb-empty">暫無記錄</li>
            </ol>
        </div>
    </div>

    <!-- 遊戲指南彈出視窗 -->
    <div class="overlay" id="overlay"></div>
    <div class="modal" id="modal">
        <div class="modal-content">
            <h2>♞ 遊戲指南</h2>
            <p>歡迎來到騎士長征！</p>
            <p>請輸入你的名字：</p>
            <input type="text" id="playerName" placeholder="你的名字" maxlength="20">
            <p style="margin-top:14px;">遊戲規則：</p>
            <ol>
                <li>遊戲開始後，騎士會隨機放置在棋盤上。</li>
                <li>點擊<span style="color:#5bc8f5;">藍色高亮</span>格子移動騎士。</li>
                <li>騎士只能按照「日」字形移動。</li>
                <li>目標是在 30 秒內讓騎士走遍最多格子。</li>
                <li>當時間到或騎士無法移動時，遊戲結束。</li>
            </ol>
            <button class="btn btn-primary" onclick="startGame()">確定開始</button>
        </div>
    </div>

    <!-- 遊戲結束彈出視窗 -->
    <div class="overlay" id="endOverlay"></div>
    <div class="modal" id="endModal">
        <div class="modal-content">
            <h2>🏁 遊戲結束</h2>
            <p id="endMessage" class="end-msg"></p>
            <div class="end-score" id="endScore"></div>
            <button class="btn btn-primary" onclick="restartGame()" style="margin-right:10px;">再玩一次</button>
            <button class="btn btn-secondary" onclick="showNewPlayerModal()">換人遊戲</button>
        </div>
    </div>

        const visitedImage = '❌';

        function initializeBoard() {
            board = [];
            boardElement.innerHTML = '';
            for (let row = 0; row < boardSize; row++) {
                board[row] = [];
                for (let col = 0; col < boardSize; col++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    // Alternating chess pattern
                    cell.classList.add((row + col) % 2 === 0 ? 'light' : 'dark');
                    cell.addEventListener('click', () => {
                        if (gameStarted && !gameEnded) moveKnight(row, col);
                    });
                    boardElement.appendChild(cell);
                    board[row][col] = { visited: false, element: cell };
                }
            }
            knightPosition = null;
            moveCount = 0;
            gameEnded = false;
            gameStarted = false;
            moveCounterEl.textContent = '0';
        }

        function showGuide() {
            modal.style.display = 'block';
            overlay.style.display = 'block';
            playerNameInput.value = '';
            playerNameInput.focus();
        }

        function showNewPlayerModal() {
            endModal.style.display = 'none';
            endOverlay.style.display = 'none';
            showGuide();
        }

        function startGame() {
            playerName = playerNameInput.value.trim();
            if (!playerName) {
                playerNameInput.style.borderColor = '#ff6b6b';
                playerNameInput.focus();
                return;
            }
            playerNameInput.style.borderColor = '';
            modal.style.display = 'none';
            overlay.style.display = 'none';
            initializeBoard();
            infoPanel.style.display = 'flex';
            playerDisplay.textContent = playerName;
            boardElement.style.display = 'grid';
            gameStarted = true;
            placeKnightRandomly();
            startTimer();
        }

        function placeKnightRandomly() {
            const row = Math.floor(Math.random() * boardSize);
            const col = Math.floor(Math.random() * boardSize);
            moveKnight(row, col);
        }

        function moveKnight(row, col) {
            if (knightPosition === null) {
                knightPosition = { row, col };
                board[row][col].visited = true;
                board[row][col].element.classList.add('visited', 'current');
                board[row][col].element.innerHTML = `<img src="${knightImage}" alt="騎士">`;
                board[row][col].element.classList.add('pop');
                moveCount++;
                moveCounterEl.textContent = moveCount;
                highlightValidMoves(row, col);
            } else {
                const currentRow = knightPosition.row;
                const currentCol = knightPosition.col;
                const rowDiff = Math.abs(row - currentRow);
                const colDiff = Math.abs(col - currentCol);

                if ((rowDiff === 2 && colDiff === 1) || (rowDiff === 1 && colDiff === 2)) {
                    if (!board[row][col].visited) {
                        board[currentRow][currentCol].element.classList.remove('current');
                        board[currentRow][currentCol].element.innerHTML = visitedImage;
                        knightPosition = { row, col };
                        board[row][col].visited = true;
                        board[row][col].element.classList.add('visited', 'current');
                        board[row][col].element.innerHTML = `<img src="${knightImage}" alt="騎士">`;
                        board[row][col].element.classList.add('pop');
                        moveCount++;
                        moveCounterEl.textContent = moveCount;
                        highlightValidMoves(row, col);

                        if (!hasValidMoves(row, col)) {
                            endGame('stuck');
                        }
                    }
                }
            }
        }

        function highlightValidMoves(row, col) {
            clearValidMoves();
            const moves = getValidMoves(row, col);
            moves.forEach(move => {
                board[move.row][move.col].element.classList.add('valid-move');
            });
        }

        function clearValidMoves() {
            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    board[r][c].element.classList.remove('valid-move');
                }
            }
        }

        function getValidMoves(row, col) {
            const offsets = [
                [2, 1], [2, -1], [-2, 1], [-2, -1],
                [1, 2], [1, -2], [-1, 2], [-1, -2]
            ];
            return offsets
                .map(([dr, dc]) => ({ row: row + dr, col: col + dc }))
                .filter(m => m.row >= 0 && m.row < boardSize &&
                             m.col >= 0 && m.col < boardSize &&
                             !board[m.row][m.col].visited);
        }

        function hasValidMoves(row, col) {
            return getValidMoves(row, col).length > 0;
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timeLeft = totalTime;
            timerValueEl.textContent = timeLeft;
            timerValueEl.classList.remove('urgent');
            timerBarEl.classList.remove('urgent');
            timerBarEl.style.width = '100%';

            timerInterval = setInterval(() => {
                timeLeft--;
                timerValueEl.textContent = timeLeft;
                timerBarEl.style.width = (timeLeft / totalTime * 100) + '%';

                if (timeLeft <= 8) {
                    timerValueEl.classList.add('urgent');
                    timerBarEl.classList.add('urgent');
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    endGame('timeout');
                }
            }, 1000);
        }

        function endGame(reason) {
            if (gameEnded) return;
            gameEnded = true;
            gameStarted = false;
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            clearValidMoves();

            const msg = reason === 'timeout'
                ? `⏱️ ${playerName}，時間到！`
                : `🚫 ${playerName}，騎士無法移動！`;
            endMessage.textContent = msg;
            endScore.textContent = `走了 ${moveCount} 格`;
            endModal.style.display = 'block';
            endOverlay.style.display = 'block';

            saveToLeaderboard(playerName, moveCount);
            renderLeaderboard();
        }

        function restartGame() {
            endModal.style.display = 'none';
            endOverlay.style.display = 'none';
            initializeBoard();
            boardElement.style.display = 'grid';
            gameStarted = true;
            gameEnded = false;
            playerDisplay.textContent = playerName;
            placeKnightRandomly();
            startTimer();
        }

        initializeBoard();

        // ── Leaderboard ──────────────────────────────────────────────────────

        function loadLeaderboard() {
            try {
                return JSON.parse(localStorage.getItem('knightTourLeaderboard') || '[]');
            } catch (e) {
                return [];
            }
        }

        function saveToLeaderboard(name, score) {
            const scores = loadLeaderboard();
            scores.push({ name, score, date: new Date().toLocaleDateString('zh-TW') });
            scores.sort((a, b) => b.score - a.score);
            const top5 = scores.slice(0, 5);
            localStorage.setItem('knightTourLeaderboard', JSON.stringify(top5));
        }

        function renderLeaderboard() {
            const scores = loadLeaderboard();
            const listEl = document.getElementById('leaderboardList');
            if (!listEl) return;
            if (scores.length === 0) {
                listEl.innerHTML = '<li class="lb-empty">暫無記錄</li>';
                return;
            }
            const medals = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣'];
            listEl.innerHTML = scores.map((s, i) =>
                `<li class="lb-row">
                    <span class="lb-rank">${medals[i] || (i + 1)}</span>
                    <span class="lb-name">${s.name}</span>
                    <span class="lb-score">${s.score} 格</span>
                    <span class="lb-date">${s.date || ''}</span>
                </li>`
            ).join('');
        }

        renderLeaderboard();
    </script>
